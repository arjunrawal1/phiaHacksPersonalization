services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: phia-backend:latest
    container_name: phia-backend
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
